services:
  mysql:
    image: mysql:8.0
    container_name: apihub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: apihub_agent
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - apihub-net

  redis:
    image: redis:7
    container_name: apihub-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - apihub-net
  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: apihub-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "YXBpaHViLWFnZW50LW5hY29zLWF1dGgtdG9rZW4tMjAyNjA2MTgtdmVyeS1sb25nLXNlY3JldA=="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "apihub-agent"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
      - "127.0.0.1:9849:9849"
      - "127.0.0.1:18080:8080"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
      - ./data/nacos/data:/home/nacos/data
    networks:
      - apihub-net
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: apihub-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./data/milvus/etcd:/etcd
    networks:
      - apihub-net

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: apihub-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - ./data/milvus/minio:/minio_data
    networks:
      - apihub-net

  milvus-standalone:
    image: milvusdb/milvus:v2.6.15
    container_name: apihub-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - ./data/milvus/milvus:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks:
      - apihub-net

  attu:
    image: zilliz/attu:v2.5
    container_name: apihub-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "127.0.0.1:8000:3000"
    depends_on:
      - milvus-standalone
    networks:
      - apihub-net
  nginx:
    image: nginx:stable
    container_name: apihub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - apihub-net
networks:
  apihub-net:
    name: apihub-net