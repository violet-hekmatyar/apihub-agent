server:
  port: ${MOCK_SCENARIO_CLIENT_PORT:8090}

spring:
  application:
    name: apihub-mock-scenario-client
  datasource:
    url: ${APIHUB_DB_URL:jdbc:mysql://127.0.0.1:3306/apihub_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${APIHUB_DB_USERNAME:root}
    password: ${APIHUB_DB_PASSWORD:${MYSQL_ROOT_PASSWORD:123456}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

apihub:
  gateway:
    base-url: ${APIHUB_GATEWAY_BASE_URL:http://localhost:8080}
  mock-campus-api:
    base-url: ${MOCK_CAMPUS_API_BASE_URL:http://localhost:8091}
