openapi: 3.0.3
info:
  title: API-HUB Agent Backend Base API
  version: 0.1.0
  description: |
    OpenAPI document for the current backend smoke-test surface only.
    Business code in the JSON response is the canonical validation target:
    code/message/data/traceId. Some business errors may still be returned with
    HTTP 200 by the current backend implementation.
servers:
  - url: http://localhost:8080
    description: Local API-HUB Agent backend
tags:
  - name: Health
    description: Service and database health checks.
  - name: Users
    description: Demo user context and user list APIs.
  - name: Dev Tools
    description: Dev-only Tool debugging APIs. These are not formal frontend entry points.
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check service health
      description: Verifies that the backend service is reachable.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      app: apihub-agent-server
                      status: UP
                      time: '2026-06-19 23:46:43'
                      javaVersion: '17'
                    traceId: trace_req_demo_health
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/health/db:
    get:
      tags:
        - Health
      summary: Check database health
      description: Verifies database connectivity and returns current seed table counts.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Database is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDbHealth'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      databaseName: apihub_agent
                      tableCount: 17
                      keyTableRows:
                        sys_user: 5
                        api_endpoint: 7
                        api_call_stat_hourly: 15
                        gateway_log: 14
                        agent_session: 4
                    traceId: trace_req_demo_db
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users/current:
    get:
      tags:
        - Users
      summary: Get current demo user
      description: |
        Returns the current demo user. If X-Demo-User-Id is omitted, the backend
        uses the default demo user.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
      responses:
        '200':
          description: Current user found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
              examples:
                defaultUser:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      username: admin_apihub
                      displayName: API Hub Admin
                      userType: MANAGER
                      orgName: Information Center
                      status: ACTIVE
                    traceId: trace_req_demo_current
                userNotFoundBusinessCode:
                  summary: Business 404 example
                  value:
                    code: 404
                    message: user not found
                    data: null
                    traceId: trace_req_demo_not_found
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users:
    get:
      tags:
        - Users
      summary: Query demo users
      description: Returns a paged list of seeded demo users.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: pageNo
          in: query
          required: false
          description: Page number, starting from 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: pageSize
          in: query
          required: false
          description: Page size. Current backend caps this value at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          example: 20
      responses:
        '200':
          description: User page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserPage'
              examples:
                firstPage:
                  value:
                    code: 200
                    message: success
                    data:
                      pageNo: 1
                      pageSize: 20
                      total: 5
                      items:
                        - id: 1
                          username: admin_apihub
                          displayName: API Hub Admin
                          userType: MANAGER
                          orgName: Information Center
                          status: ACTIVE
                    traceId: trace_req_demo_users
                cappedPageSize:
                  summary: pageSize=200 is capped to 100
                  value:
                    code: 200
                    message: success
                    data:
                      pageNo: 1
                      pageSize: 100
                      total: 5
                      items:
                        - id: 1
                          username: admin_apihub
                          displayName: API Hub Admin
                          userType: MANAGER
                          orgName: Information Center
                          status: ACTIVE
                    traceId: trace_req_demo_users_capped
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users/switch:
    post:
      tags:
        - Users
      summary: Switch current demo user
      description: Validates and returns the selected demo user.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSwitchRequest'
            examples:
              switchToAdmin:
                value:
                  userId: 1
              emptyBody:
                summary: Invalid request example
                value: {}
      responses:
        '200':
          description: Demo user switched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      username: admin_apihub
                      displayName: API Hub Admin
                      userType: MANAGER
                      orgName: Information Center
                      status: ACTIVE
                    traceId: trace_req_demo_switch
                badRequestBusinessCode:
                  summary: Business 400 example
                  value:
                    code: 400
                    message: userId is required
                    data: null
                    traceId: trace_req_demo_bad_request
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/dev/tools/queryApiInfo:
    post:
      tags:
        - Dev Tools
      summary: Dev-only queryApiInfo Tool debug endpoint
      description: |
        Runs the queryApiInfo Tool through a development-only HTTP endpoint.
        Business Tool failures are returned inside ToolResult with outer code=200.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryApiInfoRequest'
            examples:
              authLogin:
                value:
                  apiCode: AUTH_LOGIN
                  includeRateLimit: true
                  includeConsumerApps: true
      responses:
        '200':
          description: ToolResult wrapped by the unified API response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseToolResult'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      success: true
                      toolName: queryApiInfo
                      summary: API info query completed for AUTH_LOGIN.
                      data:
                        apiCode: AUTH_LOGIN
                        apiName: School Account Login
                        apiType: AUTH
                        providerUserId: 2
                        providerName: Auth API Provider
                        ownerTeam: Identity Center
                        riskLevel: HIGH
                        onlineStatus: ONLINE
                        status: ACTIVE
                        path: /api/auth/login
                        method: POST
                        rateLimitRules:
                          - ruleName: Default login rate limit
                            qpsLimit: 300
                            burstLimit: 600
                            degradeEnabled: true
                        consumerApps:
                          - appCode: COURSE_HELPER
                            appName: Course Helper Mini App
                            authStatus: APPROVED
                      evidenceItems: []
                      errorCode: null
                      errorMessage: null
                      traceId: trace_req_demo_tool_info
                      spanId: span_queryApiInfo_demo
                      latencyMs: 12
                      extraInfo: {}
                    traceId: trace_req_demo_tool_info
                apiNotFound:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryApiInfo
                      summary: API was not found.
                      data: null
                      evidenceItems: []
                      errorCode: API_NOT_FOUND
                      errorMessage: 'api not found: UNKNOWN_API'
                      traceId: trace_req_demo_tool_not_found
                      spanId: span_queryApiInfo_demo_not_found
                      latencyMs: 8
                      extraInfo: {}
                    traceId: trace_req_demo_tool_not_found
                permissionDenied:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryApiInfo
                      summary: Current user has no permission to query this API.
                      data: null
                      evidenceItems: []
                      errorCode: PERMISSION_DENIED
                      errorMessage: 'permission denied for api: LIBRARY_BORROW'
                      traceId: trace_req_demo_tool_denied
                      spanId: span_queryApiInfo_demo_denied
                      latencyMs: 9
                      extraInfo: {}
                    traceId: trace_req_demo_tool_denied
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/dev/tools/queryApiCallStats:
    post:
      tags:
        - Dev Tools
      summary: Dev-only queryApiCallStats Tool debug endpoint
      description: |
        Runs the queryApiCallStats Tool through a development-only HTTP endpoint.
        This endpoint is for backend Tool validation before Agent integration.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryApiCallStatsRequest'
            examples:
              lectureRegister:
                value:
                  apiCode: LECTURE_REGISTER
                  startTime: '2026-06-19 00:00:00'
                  endTime: '2026-06-19 23:59:59'
      responses:
        '200':
          description: ToolResult wrapped by the unified API response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseToolResult'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      success: true
                      toolName: queryApiCallStats
                      summary: API call stats query completed for LECTURE_REGISTER.
                      data:
                        apiCode: LECTURE_REGISTER
                        apiName: Lecture Register
                        startTime: '2026-06-19 00:00:00'
                        endTime: '2026-06-19 23:59:59'
                        totalCallCount: 20400
                        totalSuccessCount: 18640
                        totalFailCount: 1760
                        failRate: 0.0863
                        avgLatencyMs: 173
                        maxP95LatencyMs: 720
                        maxP99LatencyMs: 1180
                        totalRateLimitedCount: 704
                        riskLevel: HIGH
                        riskReasons:
                          - fail rate is elevated
                          - P95 latency is high
                          - rate limited calls increased
                        hourlyStats: []
                      evidenceItems: []
                      errorCode: null
                      errorMessage: null
                      traceId: trace_req_demo_tool_stats
                      spanId: span_queryApiCallStats_demo
                      latencyMs: 18
                      extraInfo: {}
                    traceId: trace_req_demo_tool_stats
                invalidArgument:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryApiCallStats
                      summary: Invalid time range.
                      data: null
                      evidenceItems: []
                      errorCode: INVALID_ARGUMENT
                      errorMessage: startTime must be before or equal to endTime
                      traceId: trace_req_demo_tool_invalid
                      spanId: span_queryApiCallStats_demo_invalid
                      latencyMs: 5
                      extraInfo: {}
                    traceId: trace_req_demo_tool_invalid
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/dev/tools/queryGatewayLogs:
    post:
      tags:
        - Dev Tools
      summary: Dev-only queryGatewayLogs Tool debug endpoint
      description: Queries gateway log samples for one external API. Evidence items are returned in ToolResult only and are not persisted to evidence_item in this round.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryGatewayLogsRequest'
            examples:
              authLogin403:
                value:
                  apiCode: AUTH_LOGIN
                  startTime: '2026-06-19 00:00:00'
                  endTime: '2026-06-19 23:59:59'
                  httpStatus: 403
                  limit: 20
      responses:
        '200':
          description: ToolResult wrapped by the unified API response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseToolResult'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      success: true
                      toolName: queryGatewayLogs
                      summary: Gateway log query completed for AUTH_LOGIN.
                      data:
                        apiCode: AUTH_LOGIN
                        apiName: School Account Login
                        totalMatched: 5
                        returnedCount: 5
                        statusDistribution:
                          403: 5
                        logs:
                          - logId: 6001
                            apiCode: AUTH_LOGIN
                            appCode: COURSE_HELPER
                            httpStatus: 403
                            errorCode: SIGNATURE_INVALID
                            errorMessage: signature verification failed
                            traceId: tr_20260619_auth_001
                            requestTime: '2026-06-19 10:12:30'
                        riskHints:
                          - authentication or signature failures are present
                      evidenceItems:
                        - evidenceType: GATEWAY_LOG
                          sourceType: gateway_log
                          sourceId: '6001'
                          title: Gateway log sample for AUTH_LOGIN
                          quote: status=403 SIGNATURE_INVALID signature verification failed
                          metadata:
                            apiCode: AUTH_LOGIN
                            httpStatus: 403
                      errorCode: null
                      errorMessage: null
                      traceId: trace_req_demo_gateway_logs
                      spanId: span_queryGatewayLogs_demo
                      latencyMs: 15
                      extraInfo: {}
                    traceId: trace_req_demo_gateway_logs
                invalidArgument:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryGatewayLogs
                      summary: Invalid time range.
                      data: null
                      evidenceItems: []
                      errorCode: INVALID_ARGUMENT
                      errorMessage: startTime must be before or equal to endTime
                      traceId: trace_req_demo_gateway_invalid
                      spanId: span_queryGatewayLogs_demo_invalid
                      latencyMs: 5
                      extraInfo: {}
                    traceId: trace_req_demo_gateway_invalid
                permissionDenied:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryGatewayLogs
                      summary: Current user has no permission to query this API.
                      data: null
                      evidenceItems: []
                      errorCode: PERMISSION_DENIED
                      errorMessage: 'permission denied for api: LIBRARY_BORROW'
                      traceId: trace_req_demo_gateway_denied
                      spanId: span_queryGatewayLogs_demo_denied
                      latencyMs: 7
                      extraInfo: {}
                    traceId: trace_req_demo_gateway_denied
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/dev/tools/queryRateLimitRule:
    post:
      tags:
        - Dev Tools
      summary: Dev-only queryRateLimitRule Tool debug endpoint
      description: Queries rate limit rules for one external API. Evidence items are returned in ToolResult only and are not persisted to evidence_item in this round.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRateLimitRuleRequest'
            examples:
              lectureRegister:
                value:
                  apiCode: LECTURE_REGISTER
                  includeInactive: false
      responses:
        '200':
          description: ToolResult wrapped by the unified API response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseToolResult'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      success: true
                      toolName: queryRateLimitRule
                      summary: Rate limit rule query completed for LECTURE_REGISTER.
                      data:
                        apiCode: LECTURE_REGISTER
                        apiName: Lecture Register
                        includeInactive: false
                        ruleCount: 1
                        activeRuleCount: 1
                        rules:
                          - ruleId: 4002
                            ruleName: Lecture register open-window rate limit
                            limitType: QPS
                            windowSeconds: 1
                            maxRequests: 180
                            threshold: 360
                            status: ACTIVE
                        riskHints:
                          - rate limit rule exists; compare it with 429 logs and call stats during peak windows
                      evidenceItems:
                        - evidenceType: RATE_LIMIT_RULE
                          sourceType: rate_limit_rule
                          sourceId: '4002'
                          title: Rate limit rule for LECTURE_REGISTER
                          quote: Lecture register open-window rate limit qps=180 burst=360
                      errorCode: null
                      errorMessage: null
                      traceId: trace_req_demo_rate_rule
                      spanId: span_queryRateLimitRule_demo
                      latencyMs: 10
                      extraInfo: {}
                    traceId: trace_req_demo_rate_rule
                apiNotFound:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryRateLimitRule
                      summary: API was not found.
                      data: null
                      evidenceItems: []
                      errorCode: API_NOT_FOUND
                      errorMessage: 'api not found: UNKNOWN_API'
                      traceId: trace_req_demo_rate_not_found
                      spanId: span_queryRateLimitRule_demo_not_found
                      latencyMs: 6
                      extraInfo: {}
                    traceId: trace_req_demo_rate_not_found
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      description: Optional caller-provided trace id.
      schema:
        type: string
      example: trace_req_demo
    XDemoUserId:
      name: X-Demo-User-Id
      in: header
      required: false
      description: Optional demo user id. Defaults to the backend demo user when omitted.
      schema:
        type: integer
        format: int64
      example: 1
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional request id for dev Tool debugging.
      schema:
        type: string
      example: req_dev_tool_001
  responses:
    BadRequest:
      description: Bad request business error example.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          examples:
            badRequest:
              value:
                code: 400
                message: invalid argument
                data: null
                traceId: trace_req_demo_bad_request
    NotFound:
      description: Not found business error example.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          examples:
            notFound:
              value:
                code: 404
                message: user not found
                data: null
                traceId: trace_req_demo_not_found
    InternalError:
      description: Internal error business example.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
          examples:
            internalError:
              value:
                code: 500
                message: internal error
                data: null
                traceId: trace_req_demo_internal_error
  schemas:
    ApiResponseHealth:
      type: object
      required:
        - code
        - message
        - data
        - traceId
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/HealthResponse'
        traceId:
          type: string
          example: trace_req_demo
    ApiResponseDbHealth:
      type: object
      required:
        - code
        - message
        - data
        - traceId
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/DbHealthResponse'
        traceId:
          type: string
          example: trace_req_demo
    ApiResponseUser:
      type: object
      required:
        - code
        - message
        - data
        - traceId
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/DemoUserResponse'
        traceId:
          type: string
          example: trace_req_demo
    ApiResponseUserPage:
      type: object
      required:
        - code
        - message
        - data
        - traceId
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/UserPageResponse'
        traceId:
          type: string
          example: trace_req_demo
    ApiResponseError:
      type: object
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: invalid argument
        data:
          type: object
          nullable: true
          example: null
        traceId:
          type: string
          example: trace_req_demo
    HealthResponse:
      type: object
      required:
        - app
        - status
        - time
        - javaVersion
      properties:
        app:
          type: string
          example: apihub-agent-server
        status:
          type: string
          example: UP
        time:
          type: string
          example: '2026-06-19 23:46:43'
        javaVersion:
          type: string
          example: '17'
    DbHealthResponse:
      type: object
      required:
        - databaseName
        - tableCount
        - keyTableRows
      properties:
        databaseName:
          type: string
          example: apihub_agent
        tableCount:
          type: integer
          example: 17
        keyTableRows:
          type: object
          additionalProperties:
            type: integer
          example:
            sys_user: 5
            api_endpoint: 7
            api_call_stat_hourly: 15
            gateway_log: 14
            agent_session: 4
    DemoUserResponse:
      type: object
      required:
        - id
        - username
        - displayName
        - userType
        - orgName
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin_apihub
        displayName:
          type: string
          example: API Hub Admin
        userType:
          type: string
          example: MANAGER
        orgName:
          type: string
          example: Information Center
        status:
          type: string
          example: ACTIVE
    UserVO:
      $ref: '#/components/schemas/DemoUserResponse'
    UserPageResponse:
      type: object
      required:
        - items
        - total
        - pageNo
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DemoUserResponse'
          example:
            - id: 1
              username: admin_apihub
              displayName: API Hub Admin
              userType: MANAGER
              orgName: Information Center
              status: ACTIVE
        total:
          type: integer
          format: int64
          example: 5
        pageNo:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
    UserSwitchRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: integer
          format: int64
          example: 1
    QueryApiInfoRequest:
      type: object
      required:
        - apiCode
      properties:
        apiCode:
          type: string
          example: AUTH_LOGIN
        includeRateLimit:
          type: boolean
          default: false
        includeConsumerApps:
          type: boolean
          default: false
    QueryApiCallStatsRequest:
      type: object
      required:
        - apiCode
      properties:
        apiCode:
          type: string
          example: LECTURE_REGISTER
        startTime:
          type: string
          example: '2026-06-19 00:00:00'
        endTime:
          type: string
          example: '2026-06-19 23:59:59'
    QueryGatewayLogsRequest:
      type: object
      required:
        - apiCode
      properties:
        apiCode:
          type: string
          example: AUTH_LOGIN
        startTime:
          type: string
          example: '2026-06-19 00:00:00'
        endTime:
          type: string
          example: '2026-06-19 23:59:59'
        httpStatus:
          type: integer
          example: 403
        keyword:
          type: string
          example: signature
        limit:
          type: integer
          default: 20
          maximum: 100
    QueryRateLimitRuleRequest:
      type: object
      required:
        - apiCode
      properties:
        apiCode:
          type: string
          example: LECTURE_REGISTER
        includeInactive:
          type: boolean
          default: false
    ApiResponseToolResult:
      type: object
      required:
        - code
        - message
        - data
        - traceId
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/ToolResult'
        traceId:
          type: string
          example: trace_req_demo_tool
    ToolResult:
      type: object
      required:
        - success
        - toolName
        - summary
        - evidenceItems
        - traceId
        - spanId
        - latencyMs
        - extraInfo
      properties:
        success:
          type: boolean
        toolName:
          type: string
          example: queryApiInfo
        summary:
          type: string
        data:
