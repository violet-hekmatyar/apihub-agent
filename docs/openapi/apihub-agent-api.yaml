                eventStream:
                  value: |
                    event: agent_start
                    data: {"runId":"run_20260620120000003","scenarioCode":"LECTURE_REGISTER_PEAK"}

                    event: tool_step
                    data: {"stepNo":1,"toolName":"queryApiInfo","success":true}

                    event: evidence
                    data: {"sourceType":"campus_event","sourceId":"8001"}

                    event: answer
                    data: {"finalAnswer":"Deterministic Agent Run result..."}

                    event: done
                    data: {"success":true}
