openapi: 3.0.3
info:
  title: API-HUB Agent Backend Base API
  version: 0.1.0
  description: |
    OpenAPI document for the current backend smoke-test surface only.
    Business code in the JSON response is the canonical validation target:
    code/message/data/traceId. Some business errors may still be returned with
    HTTP 200 by the current backend implementation.
servers:
  - url: http://localhost:8080
    description: Local API-HUB Agent backend
tags:
  - name: Health
    description: Service and database health checks.
  - name: Users
    description: Demo user context and user list APIs.
  - name: Dev Tools
    description: Dev-only Tool debugging APIs. These are not formal frontend entry points.
  - name: Dev Eval
    description: Dev-only deterministic Tool Chain Eval APIs.
  - name: Agent Run
    description: Deterministic Agent Run and SSE skeleton APIs.
  - name: Dev Gateway
    description: Dev-only Gateway Invoke API for calling mock-provider and writing gateway_log.
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check service health
      description: Verifies that the backend service is reachable.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      app: apihub-agent-server
                      status: UP
                      time: '2026-06-19 23:46:43'
                      javaVersion: '17'
                    traceId: trace_req_demo_health
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/health/db:
    get:
      tags:
        - Health
      summary: Check database health
      description: Verifies database connectivity and returns current seed table counts.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Database is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDbHealth'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      databaseName: apihub_agent
                      tableCount: 17
                      keyTableRows:
                        sys_user: 5
                        api_endpoint: 7
                        api_call_stat_hourly: 15
                        gateway_log: 14
                        agent_session: 4
                    traceId: trace_req_demo_db
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users/current:
    get:
      tags:
        - Users
      summary: Get current demo user
      description: |
        Returns the current demo user. If X-Demo-User-Id is omitted, the backend
        uses the default demo user.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
      responses:
        '200':
          description: Current user found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
              examples:
                defaultUser:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      username: admin_apihub
                      displayName: API Hub Admin
                      userType: MANAGER
                      orgName: Information Center
                      status: ACTIVE
                    traceId: trace_req_demo_current
                userNotFoundBusinessCode:
                  summary: Business 404 example
                  value:
                    code: 404
                    message: user not found
                    data: null
                    traceId: trace_req_demo_not_found
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users:
    get:
      tags:
        - Users
      summary: Query demo users
      description: Returns a paged list of seeded demo users.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - name: pageNo
          in: query
          required: false
          description: Page number, starting from 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: pageSize
          in: query
          required: false
          description: Page size. Current backend caps this value at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          example: 20
      responses:
        '200':
          description: User page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserPage'
              examples:
                firstPage:
                  value:
                    code: 200
                    message: success
                    data:
                      pageNo: 1
                      pageSize: 20
                      total: 5
                      items:
                        - id: 1
                          username: admin_apihub
                          displayName: API Hub Admin
                          userType: MANAGER
                          orgName: Information Center
                          status: ACTIVE
                    traceId: trace_req_demo_users
                cappedPageSize:
                  summary: pageSize=200 is capped to 100
                  value:
                    code: 200
                    message: success
                    data:
                      pageNo: 1
                      pageSize: 100
                      total: 5
                      items:
                        - id: 1
                          username: admin_apihub
                          displayName: API Hub Admin
                          userType: MANAGER
                          orgName: Information Center
                          status: ACTIVE
                    traceId: trace_req_demo_users_capped
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/users/switch:
    post:
      tags:
        - Users
      summary: Switch current demo user
      description: Validates and returns the selected demo user.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSwitchRequest'
            examples:
              switchToAdmin:
                value:
                  userId: 1
              emptyBody:
                summary: Invalid request example
                value: {}
      responses:
        '200':
          description: Demo user switched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      id: 1
                      username: admin_apihub
                      displayName: API Hub Admin
                      userType: MANAGER
                      orgName: Information Center
                      status: ACTIVE
                    traceId: trace_req_demo_switch
                badRequestBusinessCode:
                  summary: Business 400 example
                  value:
                    code: 400
                    message: userId is required
                    data: null
                    traceId: trace_req_demo_bad_request
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/dev/tools/queryApiInfo:
    post:
      tags:
        - Dev Tools
      summary: Dev-only queryApiInfo Tool debug endpoint
      description: |
        Runs the queryApiInfo Tool through a development-only HTTP endpoint.
        Business Tool failures are returned inside ToolResult with outer code=200.
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/XDemoUserId'
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryApiInfoRequest'
            examples:
              authLogin:
                value:
                  apiCode: AUTH_LOGIN
                  includeRateLimit: true
                  includeConsumerApps: true
      responses:
        '200':
          description: ToolResult wrapped by the unified API response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseToolResult'
              examples:
                success:
                  value:
                    code: 200
                    message: success
                    data:
                      success: true
                      toolName: queryApiInfo
                      summary: API info query completed for AUTH_LOGIN.
                      data:
                        apiCode: AUTH_LOGIN
                        apiName: School Account Login
                        apiType: AUTH
                        providerUserId: 2
                        providerName: Auth API Provider
                        ownerTeam: Identity Center
                        riskLevel: HIGH
                        onlineStatus: ONLINE
                        status: ACTIVE
                        path: /api/auth/login
                        method: POST
                        rateLimitRules:
                          - ruleName: Default login rate limit
                            qpsLimit: 300
                            burstLimit: 600
                            degradeEnabled: true
                        consumerApps:
                          - appCode: COURSE_HELPER
                            appName: Course Helper Mini App
                            authStatus: APPROVED
                      evidenceItems: []
                      errorCode: null
                      errorMessage: null
                      traceId: trace_req_demo_tool_info
                      spanId: span_queryApiInfo_demo
                      latencyMs: 12
                      extraInfo: {}
                    traceId: trace_req_demo_tool_info
                apiNotFound:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryApiInfo
                      summary: API was not found.
                      data: null
                      evidenceItems: []
                      errorCode: API_NOT_FOUND
                      errorMessage: 'api not found: UNKNOWN_API'
                      traceId: trace_req_demo_tool_not_found
                      spanId: span_queryApiInfo_demo_not_found
                      latencyMs: 8
                      extraInfo: {}
                    traceId: trace_req_demo_tool_not_found
                permissionDenied:
                  value:
                    code: 200
                    message: success
                    data:
                      success: false
                      toolName: queryApiInfo
                      summary: Current user has no permission to query this API.
                      data: null
                      evidenceItems: []
                      errorCode: PERMISSION_DENIED
                      errorMessage: 'permission denied for api: LIBRARY_BORROW'
                      traceId: trace_req_demo_tool_denied
                      spanId: span_queryApiInfo_demo_denied
                      latencyMs: 9
                      extraInfo: {}
                    traceId: trace_req_demo_tool_denied
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
